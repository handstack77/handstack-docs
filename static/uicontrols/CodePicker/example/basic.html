<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CodePicker - 기본 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <p>가장 단순한 CodePicker 예제입니다. 돋보기 버튼(<code>chpCompanyID_Button</code>)을 클릭하면 검색 팝업이 열리고, 팝업에서 항목을 선택하면 코드값/코드명 입력창에 결과가 채워집니다.</p>
            <p>실제 팝업 목록은 서버에 <code>dataSourceID</code>(<code>BDLCHP011</code>)가 등록되어 있어야 조회됩니다. 데이터소스가 없는 환경에서는 아래 버튼으로 값 조회/설정 API만 확인해도 됩니다.</p>
            <div>
                <label>업체 명</label>
                <syn_codepicker id="chpCompanyID" syn-datafield="CompanyID" syn-options="{
                    belongID: 'LD01',
                    dataSourceID: 'BDLCHP011',
                    local: false,
                    isMultiSelect: false,
                    textBelongID: ['LD01'],
                    textDataFieldID: 'CompanyName',
                    controlText: '업체 명'
                }"></syn_codepicker>
            </div>
        </div>
        <hr />
        <div>
            <input type="button" id="btnOpen" value="open (팝업 열기)" syn-events="['click']" />
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue('1000')" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
