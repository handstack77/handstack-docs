<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>CodePicker - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>CodePicker 양방향 바인딩</h1>
            <p class="description">CodePicker의 코드값을 어댑터로 연결합니다. 검색 팝업은 예제 데이터 소스가 구성된 환경에서 동작합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(codepicker):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_codepicker id="chpBinding" syn-options="{
                    dataSourceID: 'CHP010',
                    storeSourceID: 'Company',
                    valueColumnID: 'CompanyID',
                    textColumnID: 'CompanyName'
                }" syn-events="['change']"></syn_codepicker>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 코드 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="컨트롤 값을 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script>
        function pageLoadFiles(jsFiles, styleFiles, templateFiles) {
            styleFiles.push('/uicontrols/TextBox/TextBox.css');
            jsFiles.push('/lib/vanilla-masker/vanilla-masker.min.js');
            jsFiles.push('/uicontrols/TextBox/TextBox.js');
        }
    </script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
