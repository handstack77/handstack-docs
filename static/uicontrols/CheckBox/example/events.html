<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CheckBox - 이벤트/메서드 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <h3>CheckBox 이벤트 및 메서드 예제</h3>
        <p>
            <code>syn-events</code>에 <code>change</code>를 등록하면 사용자가 체크 상태를 바꿀 때마다
            페이지 스크립트의 <code>chkNotify_change(evt)</code> 핸들러가 호출됩니다.
            아래 버튼으로 getValue / setValue / clear / toggleValue 메서드도 함께 확인할 수 있습니다.
        </p>

        <div>
            <input id="chkNotify" type="checkbox" syn-datafield="NotifyYN" syn-events="['change']"
                syn-options="{checkedValue: '1', uncheckedValue: '0', textContent: '알림 받기'}">
        </div>

        <hr />

        <div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValueTrue" value="setValue('1') (체크)" syn-events="['click']" />
            <input type="button" id="btnSetValueFalse" value="setValue(false) (해제)" syn-events="['click']" />
            <input type="button" id="btnToggleValue" value="toggleValue" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
