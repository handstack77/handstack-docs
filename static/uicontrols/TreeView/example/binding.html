<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>TreeView - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>TreeView 양방향 바인딩</h1>
            <p class="description">활성 노드의 key를 모델 값으로 정의해 클릭 선택과 <code>activateKey</code>를 연결합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(treeview):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_tree id="tvlBinding" syn-options="{height: '260px', itemID: 'key'}" syn-events="['click']"></syn_tree>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 활성 노드 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="활성 노드를 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
