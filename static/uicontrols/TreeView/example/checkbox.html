<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>체크박스로 다중 선택하기 (checkbox: true)</div>
            <p>체크박스를 클릭해서 여러 노드를 선택한 뒤 "선택된 노드 가져오기"를 눌러 보세요.</p>
            <syn_tree id="tvlCheckTree" syn-options="{
                height: '260px',
                checkbox: true
            }" syn-events="['click']"></syn_tree>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnGetSelected" value="getSelectedNodes" syn-events="['click']" />
            <input type="button" id="btnSelectAll" value="selectedAll(true)" syn-events="['click']" />
            <input type="button" id="btnUnselectAll" value="selectedAll(false)" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>선택된 노드 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
