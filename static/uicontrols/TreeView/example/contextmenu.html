<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>ContextMenu와 결합하기 - 노드 우클릭 메뉴</div>
            <p>트리 노드를 마우스 오른쪽 버튼으로 클릭하면 "이름변경/삭제" 메뉴가 뜹니다. 폴더가 아닌 노드(사원)에서는 "삭제"만 활성화됩니다.</p>
            <syn_tree id="tvlTreeView" syn-options="{
                itemID: 'key',
                parentItemID: 'parentID',
                childrenID: 'children',
                reduceMap: { key: 'ProgramID', title: 'ProgramName', parentID: 'ParentID', folder: 'FolderYN', icon: false },
                height: '260px'
            }" syn-events="['click']"></syn_tree>
            <syn_contextmenu id="ctxTreeItem" syn-options="{
                target: '#tvlTreeView',
                delegate: 'span.fancytree-title',
                menu: [
                    { title: '이름 변경', cmd: 'rename' },
                    { title: '---' },
                    { title: '삭제', cmd: 'delete', uiIcon: 'ui-icon-trash' }
                ]
            }" syn-events="['beforeOpen', 'select']"></syn_contextmenu>
        </div>
        <hr />
        <div>
            <div>이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
