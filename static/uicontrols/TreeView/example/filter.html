<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>filter 확장으로 노드 검색하기</div>
            <p>이름을 입력하고 Enter를 누르면 일치하는 노드만 남기고 나머지는 숨겨집니다(기본 확장 `extensions: ['persist', 'filter']`에 filter가 포함되어 있어 별도로 확장을 추가하지 않아도 됩니다).</p>
            <div class="input-group">
                <input type="text" id="txtTreeNodeFilter" syn-events="['keydown']" placeholder="검색할 이름을 입력하세요" />
                <input type="button" id="btnDeleteTreeFilter" value="필터 해제" syn-events="['click']" />
            </div>
            <syn_tree id="tvlTreeView" syn-options="{ height: '260px' }" syn-events="['click']"></syn_tree>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnFilterBranches" value="filterBranches('개발')" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
