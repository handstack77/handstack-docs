<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GridList - 체크박스 다중 선택 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <p><code>checkbox: true</code> 옵션을 사용하면 첫 번째 컬럼이 체크박스 선택 컬럼이 되어, 여러 행을 동시에 선택할 수 있습니다.</p>
            <syn_list id="lstCheckbox" syn-options="{
                checkbox: true,
                pageLength: 5,
                columns: [
                    { title: '', data: 'id', width: '30px' },
                    { title: '이름', data: 'name', width: '120px' },
                    { title: '직급', data: 'position', width: '160px' },
                    { title: '사무실', data: 'office', width: '120px' }
                ]
            }" style="width: 100%; border: 1px solid #ccc;"></syn_list>
        </div>
        <hr />
        <div>
            <input type="button" id="btnGetChecked" value="선택된 행 조회" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
