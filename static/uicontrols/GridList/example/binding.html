<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>GridList - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>GridList 양방향 바인딩</h1>
            <p class="description">목록 행 배열을 어댑터로 연결하고 DataTables API의 셀 변경을 모델에 반영합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(gridlist):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_list id="lstBinding" syn-options="{
                    paging: false,
                    searching: false,
                    columns: [
                        {title: 'ID', data: 'id'},
                        {title: '이름', data: 'name'},
                        {title: '부서', data: 'department'}
                    ]
                }"></syn_list>
                <input type="button" id="btnListControlChange" value="목록 API로 첫 행 수정" syn-events="['click']">
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 행 추가" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="목록을 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
