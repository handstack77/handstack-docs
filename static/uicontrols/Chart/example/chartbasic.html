<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>기본 사용법 - $chart(Highcharts 기반) 컬럼 차트</div>
            <p>syn-options에 Highcharts 설정 객체를 그대로 넣습니다.</p>
            <syn_chart id="chtSales" style="width:100%; height:320px" syn-options="{
                chart: { type: 'column' },
                title: { text: '연도별 매출' },
                xAxis: { categories: ['1분기', '2분기', '3분기', '4분기'] },
                yAxis: { title: { text: '매출(백만원)' } },
                series: [
                    { name: '2024', data: [12, 35, 18, 42] },
                    { name: '2025', data: [20, 15, 30, 25] }
                ]
            }"></syn_chart>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue (알려진 버그 확인)" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
            <input type="button" id="btnToImage" value="toImage (알려진 버그 확인)" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>결과 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
