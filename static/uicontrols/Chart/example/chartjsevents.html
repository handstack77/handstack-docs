<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>$chartjs 클릭 이벤트 / getChartControl 활용 예제</div>
            <p>
                $chartjs는 syn-events로 클릭을 넘겨줘도 페이지 스크립트까지 값이 전달되지 않습니다(API.md "알려진 이슈" 참고).
                대신 Chart.js 자체의 options.onClick 콜백을 syn-options에 직접 넣어서 클릭한 지점의 값을 읽습니다.
            </p>
            <syn_chartjs id="chtTrend" style="width:100%; height:320px" syn-options="{
                type: 'line',
                labelID: 'MONTH',
                series: [
                    { columnID: 'VISIT', label: '방문자수', fill: true },
                    { columnID: 'SIGNUP', label: '가입자수', fill: false }
                ],
                options: {
                    onClick(evt, elements, chart) {
                        if (elements.length > 0) {
                            var point = elements[0];
                            var label = chart.data.labels[point.index];
                            var dataset = chart.data.datasets[point.datasetIndex];
                            syn.$l.eventLog('chtTrend_onClick', label + ' / ' + dataset.label + ' = ' + dataset.data[point.index]);
                        }
                    }
                }
            }"></syn_chartjs>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnSetValue" value="setValue" syn-events="['click']" />
            <input type="button" id="btnGetChartControl" value="getChartControl로 제목 바꾸기" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>결과 / 이벤트 로그 (차트를 클릭해서 onClick 로그도 확인해 보세요)</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
