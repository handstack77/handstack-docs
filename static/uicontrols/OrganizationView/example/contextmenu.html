<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>ContextMenu와 결합하기 - 노드 우클릭 메뉴</div>
            <p>조직도 노드를 마우스 오른쪽 버튼으로 클릭하면 "조직 구성원 보기 / 하위조직 생성" 메뉴가 뜹니다.</p>
            <syn_organization id="orgChartView" syn-options="{
                height: '320px',
                nodeTitle: 'name',
                nodeContent: 'title'
            }" syn-events="['click']"></syn_organization>
            <syn_contextmenu id="ctxTreeItem" syn-options="{
                target: '#orgChartView',
                delegate: 'div.node',
                menu: [
                    { title: '조직 구성원 보기', cmd: 'user_department' },
                    { title: '---' },
                    { title: '하위조직 생성', cmd: 'create_department' }
                ]
            }" syn-events="['beforeOpen', 'select']"></syn_contextmenu>
        </div>
        <hr />
        <div>
            <div>이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
