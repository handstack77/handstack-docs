<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>이벤트 - nodedrop / select / click, 그리고 getRelatedNodes</div>
            <p>노드를 드래그해서 다른 노드 위에 놓으면 소속(상위 조직)이 바뀝니다(`draggable: true`). 노드를 한 번 클릭해서 선택한 뒤 "선택 노드의 하위 조직 보기" 버튼을 눌러보세요.</p>
            <syn_organization id="orgChartView" syn-options="{
                height: '320px',
                draggable: true,
                nodeTitle: 'name',
                nodeContent: 'title'
            }" syn-events="['nodedrop', 'select', 'click']"></syn_organization>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue(초기화)" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
            <input type="button" id="btnGetRelatedNodes" value="선택 노드의 하위 조직 보기" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>결과 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
