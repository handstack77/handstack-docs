<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>OrganizationView - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>OrganizationView 양방향 바인딩</h1>
            <p class="description">선택한 조직 노드 ID를 모델로 정의하고 선택 이벤트와 강조 상태를 연결합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(organization):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_organization id="orgBinding" syn-options="{height: '300px'}" syn-events="['select']"></syn_organization>
                <p>선택 노드: <strong id="spnOrganizationNode"></strong></p>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 선택 노드 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="선택 노드를 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
