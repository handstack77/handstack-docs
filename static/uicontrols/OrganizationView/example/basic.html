<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>기본 사용법 - 계층 데이터를 조직도로 표시하기</div>
            <p>기본 `reduceMap`(key/title/parentID)에 `nodeTitle: 'name'`, `nodeContent: 'title'`을 지정한 가장 단순한 예제입니다.</p>
            <syn_organization id="orgChartView" syn-options="{
                height: '320px',
                nodeTitle: 'name',
                nodeContent: 'title'
            }" syn-events="['select', 'click']"></syn_organization>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
            <input type="button" id="btnGetControl" value="getControl" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>결과 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
