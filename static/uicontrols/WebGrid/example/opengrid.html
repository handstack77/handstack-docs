<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenGrid Example</title>
    <link rel="stylesheet" href="../OpenGrid.css">
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f7f8fa;
            color: #1f2937;
            font-family: Arial, "Malgun Gothic", sans-serif;
            font-size: 14px;
        }

        .example-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .example-panel {
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
        }

        .example-panel h1 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .example-button {
            min-height: 32px;
            padding: 6px 12px;
            border: 1px solid #2563eb;
            border-radius: 4px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .example-button.secondary {
            border-color: #6b7280;
            background: #fff;
            color: #374151;
        }

        .example-search {
            min-height: 30px;
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }

        .example-log {
            min-height: 96px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fafafa;
            font-family: Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="example-panel">
        <h1>OpenGrid UIControl Example</h1>
        <div class="example-toolbar">
            <button type="button" class="example-button" id="btnLoad">데이터 조회</button>
            <button type="button" class="example-button" id="btnInsert">행 추가</button>
            <button type="button" class="example-button" id="btnRemove">행 삭제</button>
            <button type="button" class="example-button secondary" id="btnUpdateItems">변경 데이터 확인</button>
            <button type="button" class="example-button secondary" id="btnExport">CSV 내보내기</button>
            <button type="button" class="example-button secondary" id="btnClearFilter">필터 초기화</button>
            <input type="text" class="example-search" id="txtSearch" placeholder="전체 검색..." />
        </div>

        <div id="grdMember" syn-datafield="Member" syn-events="['rowClick', 'cellEditEnd', 'selectionChange']" style="width:100%;height:420px;"></div>

        <div class="example-log" id="divLog"></div>
    </div>

    <script src="../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../OpenGrid.js"></script>
    <script src="opengrid-example.js"></script>
</body>
</html>
