<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>WebGrid - $grid (Handsontable) 기본 사용법</title>
</head>
<body>
	<form autocomplete="off" id="form1" syn-datafield="MainForm">
		<h3>$grid (Handsontable 기반) - 기본 CRUD</h3>

		<syn_grid id="grdBasic" syn-options="{
			height: 250,
			columns: [
				['ProdID', '제품코드', 120, false, 'text', true, 'left'],
				['ProdName', '제품명', 200, false, 'text', false, 'left'],
				['Price', '가격', 100, false, 'numeric', false, 'right'],
				['UseYN', '사용여부', 80, false, 'checkbox', false, 'center']
			]
		}" syn-events="['afterSelectionEnd']" style="width: 600px;"></syn_grid>

		<hr>
		<input type="button" id="btnLoadRows" value="샘플 데이터 채우기" syn-events="['click']">
		<input type="button" id="btnInsertRow" value="행 추가" syn-events="['click']">
		<input type="button" id="btnRemoveRow" value="선택 행 삭제" syn-events="['click']">
		<input type="button" id="btnGetValue" value="getValue(변경분)" syn-events="['click']">
		<input type="button" id="btnClear" value="clear" syn-events="['click']">
	</form>

	<script src="/js/syn.loader.js"></script>
</body>
</html>
