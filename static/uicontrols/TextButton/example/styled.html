<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>속성</div>
            <pre>toSynControl: true 로 설정하면 controlLoad 시점에
'btn' 클래스와 'btn-{color}' 클래스가 자동으로 추가됩니다.
(color 기본값은 'default' 이므로 지정하지 않으면 'btn-default'가 붙습니다.)</pre>
        </div>
        <hr />
        <div>
            <div>예시 - color: 'primary', toSynControl: true</div>
            <input type="button" id="btnPrimary" value="확인" syn-options="{toSynControl: true, color: 'primary'}" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>예시 - color: 'danger', toSynControl: true</div>
            <input type="button" id="btnDanger" value="삭제" syn-options="{toSynControl: true, color: 'danger'}" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>예시 - toSynControl 기본값(false), 옵션 없음</div>
            <input type="button" id="btnPlain" value="옵션 없음" syn-events="['click']" />
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnCheckClass" value="클래스 확인" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
