<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>HtmlEditor - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>HtmlEditor 양방향 바인딩</h1>
            <p class="description">TinyMCE의 변경 이벤트와 HTML 문자열 모델을 어댑터로 연결합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(htmleditor):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_htmleditor id="edtBinding" style="width:100%; height:260px" syn-options="{}"></syn_htmleditor>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 HTML 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="에디터 값을 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/lib/tinymce/tinymce.min.js"></script>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
