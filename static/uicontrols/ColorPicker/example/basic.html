<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>기본 사용법</div>
            <p>미리 정의된 색상(defaultColor)으로 초기화된 컬러피커입니다. 스와치를 클릭하거나 코드를 직접 입력해보세요.</p>
            <syn_colorpicker id="clpBackgroundColor" syn-datafield="BackgroundColor" syn-options="{
                defaultColor: 'FF0000'
            }" syn-events="['change']"></syn_colorpicker>
        </div>
        <hr />
        <div>
            <div>커스텀 팔레트</div>
            <p>defineColors 옵션으로 팔레트 스와치를 원하는 색상 목록으로 바꿀 수 있습니다.</p>
            <syn_colorpicker id="clpAccentColor" syn-datafield="AccentColor" syn-options="{
                defaultColor: '0080FF',
                defineColors: ['FF0000', '00FF00', '0000FF', 'FFFF00', '000000', 'FFFFFF']
            }" syn-events="['change']"></syn_colorpicker>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
