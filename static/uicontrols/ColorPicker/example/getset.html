<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>예시</div>
            <syn_colorpicker id="clpColor" syn-datafield="Color" syn-options="{
                defaultColor: '00FF00'
            }"></syn_colorpicker>
        </div>
        <hr />
        <div>
            <div>기능</div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue('#FF00FF')" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
