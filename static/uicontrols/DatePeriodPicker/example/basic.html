<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DatePeriodPicker - 기본 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <p>가장 단순한 형태의 <code>DatePeriodPicker</code> 예제입니다. 달력 버튼을 클릭하면 팝업이 열리고, 좌우 달력에서 시작일/종료일을 각각 클릭한 뒤 "확인" 버튼을 누르면 입력창에 값이 채워집니다. 팝업 상단의 "올해/오늘까지/오늘/전일/주간/전주/당월/이전달/전년도/전전년도/1~4분기/상반기/하반기" 버튼과 월별 체크박스로도 빠르게 기간을 선택할 수 있습니다.</p>
            <div>
                <label>조회 기간</label>
                <syn_dateperiodpicker id="dtpSearchPeriod" syn-datafield="SearchPeriod"></syn_dateperiodpicker>
            </div>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
