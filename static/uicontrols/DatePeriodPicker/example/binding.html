<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>DatePeriodPicker - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>DatePeriodPicker 양방향 바인딩</h1>
            <p class="description">기간을 <code>시작일,종료일</code> 문자열로 정규화해 Proxy 모델과 연결합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(dateperiodpicker):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <syn_dateperiodpicker id="dtpBinding" syn-events="['onselect', 'onconfirm']"></syn_dateperiodpicker>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 기간 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="컨트롤 값을 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
