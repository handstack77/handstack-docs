<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>TextBox - 숫자 서식</title>
</head>
<body>
	<form autocomplete="off" id="form1" syn-datafield="MainForm">
		<h3>TextBox 숫자/스피너 서식</h3>

		<div>
			<label for="txtNumber">숫자만 입력, 콤마 서식 없음 (number)</label><br>
			<input id="txtNumber" type="text" syn-options="{editType: 'number', dataType: 'int'}" value="0">
		</div>
		<br>

		<div>
			<label for="txtAmount">숫자 + 3자리 콤마 서식, 0~1000000 범위 (numeric)</label><br>
			<input id="txtAmount" type="text" syn-options="{editType: 'numeric', formatNumber: true, minCount: 0, maxCount: 1000000, dataType: 'int'}" value="0">
		</div>
		<br>

		<div>
			<label for="txtNoFormat">숫자 입력, 콤마 서식 끄기 (formatNumber: false)</label><br>
			<input id="txtNoFormat" type="text" syn-options="{editType: 'numeric', formatNumber: false, dataType: 'int'}" value="0">
		</div>
		<br>

		<div>
			<label for="txtSpinner">스피너 (spinner, -10~10)</label><br>
			<input id="txtSpinner" type="text" syn-options="{editType: 'spinner', dataType: 'int', minCount: -10, maxCount: 10}" value="0">
		</div>

		<hr>
		<input type="button" id="btnGetValue" value="getValue(txtAmount)" syn-events="['click']">
	</form>

	<script src="/js/syn.loader.js"></script>
</body>
</html>
