<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>TextBox - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>TextBox 양방향 바인딩</h1>
            <p class="description"><code>adapter(textbox):value</code>가 TextBox의 입력값과 Proxy 모델을 연결합니다.</p>
            <div id="bindAnchor" class="binding-anchor" syn-bind="adapter(textbox):value"></div>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <input id="txtBinding" type="text" syn-options="{editType: 'text'}" syn-events="['input']" style="width: 320px;">
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 값 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="컨트롤 값을 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
