<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>DataSource - syn.$bind 양방향 바인딩</title>
    <link rel="stylesheet" href="/uicontrols/binding-example.css">
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <main id="bindingRoot" class="binding-example">
            <h1>DataSource 양방향 바인딩</h1>
            <p class="description">Form DataSource 객체 전체를 <code>syn.$bind</code>의 하나의 모델 값으로 연결합니다.</p>
            <div class="binding-anchor" syn-bind="adapter(datasource):value"></div>
            <syn_data id="srcBinding" syn-options="{
                dataSourceID: 'BindingStore',
                storeType: 'Form',
                columns: [
                    {data: 'Name', dataType: 'string'},
                    {data: 'Age', dataType: 'number'}
                ]
            }"></syn_data>

            <section class="binding-panel">
                <h2>컨트롤에서 변경</h2>
                <label>이름 <input id="txtDataName" type="text" syn-datafield="Name" syn-options="{bindingID: 'BindingStore'}" syn-events="['change']"></label>
                <label>나이 <input id="txtDataAge" type="number" syn-datafield="Age" syn-options="{bindingID: 'BindingStore'}" syn-events="['change']"></label>
            </section>

            <section class="binding-panel">
                <h2>바인딩 확인</h2>
                <div class="binding-toolbar">
                    <input type="button" id="btnModelChange" value="Proxy 모델 객체 변경" syn-events="['click']">
                    <input type="button" id="btnControlRead" value="DataSource를 모델로 읽기" syn-events="['click']">
                </div>
                <div class="binding-direction" syn-bind="text:direction"></div>
                <pre id="preModel" class="binding-preview"></pre>
            </section>
        </main>
    </form>
    <script src="/uicontrols/binding-example.js"></script>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
