<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TextArea 기본 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <div>
            <div>기본 TextArea (CodeMirror 모드, toSynControl: true 기본값)</div>
            <textarea id="txtBasic"
                      syn-options="{width: '500px', height: '200px'}"
                      syn-events="[]">안녕하세요.
여러 줄 텍스트를 입력할 수 있습니다.</textarea>
        </div>
        <hr />
        <div>
            <div>일반 textarea 모드 (toSynControl: false)</div>
            <textarea id="txtPlain"
                      syn-options="{width: '500px', height: '120px', toSynControl: false}"
                      syn-events="[]">CodeMirror 없이 순수 textarea로 동작합니다.</textarea>
        </div>
        <hr />
        <div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
            <input type="button" id="btnCountLines" value="countLines" syn-events="['click']" />
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
