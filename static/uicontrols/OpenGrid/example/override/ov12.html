<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-12 컨텍스트 메뉴 커스터마이즈 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-12 · 컨텍스트 메뉴 커스터마이즈</h2>
    <p class="desc">grid.override("openContextMenu", ...)로 우클릭 시 커스텀 훅이 실행되는 것을 로그로 확인합니다. 행 위에서 우클릭해 보세요.</p>
    <syn_opengrid id="grdOv12" class="demo-grid" syn-options="{
        contextMenu: true,
        columns: [['MemberNo', '번호', 70, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov12.js"></script>
</body>
</html>
