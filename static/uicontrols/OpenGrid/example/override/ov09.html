<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">

<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-09 · 리사이즈 쓰로틀</h2>
    <p class="desc">grid.override("setSkinVar", ...)에 쓰로틀을 걸어, 짧은 시간에 연속 호출해도 일정 간격으로만 실행되게 합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv09_burst">10회 연속 호출(쓰로틀 확인)</button>
    </div>
    <syn_opengrid id="grdOv09" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호', 70, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
