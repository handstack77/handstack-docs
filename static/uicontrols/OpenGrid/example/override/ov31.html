<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-31 전역 기본 오버라이드 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-31 · 전역 기본 오버라이드</h2>
    <p class="desc">OpenGrid.defaultOverride(name, fn)로 등록한 전역 기본값은, 이후 새로 생성되는 모든 그리드 인스턴스에 자동 적용됩니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv31_register">전역 기본 오버라이드 등록</button>
        <button type="button" id="grdOv31_create" class="secondary">새 그리드 인스턴스 생성 후 확인</button>
    </div>
    <syn_opengrid id="grdOv31" class="demo-grid" syn-options="{
        columns: [['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov31.js"></script>
</body>
</html>
