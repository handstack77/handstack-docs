<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-05 행 추가 시 자동값 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-05 · 행 추가 시 자동값</h2>
    <p class="desc">grid.override("insertRow", ...)로 번호·가입일을 자동 채웁니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv05_add">빈 행 추가</button>
    </div>
    <syn_opengrid id="grdOv05" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호(자동)', 90, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text'], ['JoinDate', '가입일(자동)', 110, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov05.js"></script>
</body>
</html>
