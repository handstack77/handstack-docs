<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-24 엑셀 직렬화 커스터마이즈 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-24 · 엑셀 직렬화 커스터마이즈</h2>
    <p class="desc">grid.override.strategy("cellSerializer", fn)으로 UseYN 값을 엑셀에는 "사용/미사용" 문자열로 내보냅니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv24_export">Excel 내보내기</button>
    </div>
    <syn_opengrid id="grdOv24" class="demo-grid" syn-options="{
        columns: [['MemberName', '이름', 120, false, 'text'], ['UseYN', '사용여부', 100, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov24.js"></script>
</body>
</html>
