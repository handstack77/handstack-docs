<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-29 strict 에러 전파 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-29 · strict 에러 전파</h2>
    <p class="desc">기본(strict)은 오버라이드 내부 에러를 그대로 던지고, { onError: "fallback" } 옵션을 주면 에러를 삼키고 원본 동작으로 폴백합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv29_strict">strict(에러 전파) 확인</button>
        <button type="button" id="grdOv29_fallback" class="secondary">onError:fallback 확인</button>
    </div>
    <syn_opengrid id="grdOv29" class="demo-grid" syn-options="{
        columns: [['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov29.js"></script>
</body>
</html>
