<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-15 되돌리기·다시하기 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-15 · 되돌리기·다시하기<span class="demo-badge">inject</span></h2>
    <p class="desc">undo()/redo()는 빈 스텁입니다. grid.override로 스냅샷 스택 기반 실제 Undo/Redo를 주입합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv15_snap">Point +100(스냅샷 저장)</button>
        <button type="button" id="grdOv15_undo">Undo</button>
        <button type="button" id="grdOv15_redo" class="secondary">Redo</button>
    </div>
    <syn_opengrid id="grdOv15" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호', 70, false, 'number', true, 'center'], ['Point', '포인트', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov15.js"></script>
</body>
</html>
