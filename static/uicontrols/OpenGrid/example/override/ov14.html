<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-14 ID로 행 삭제 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-14 · ID로 행 삭제<span class="demo-badge">inject</span></h2>
    <p class="desc">deleteById()는 빈 스텁 메서드입니다. grid.override("deleteById", ...)로 실제 동작을 주입(inject)합니다.</p>
    <div class="demo-toolbar">
        <input type="number" id="grdOv14_id" style="width:80px;" value="3">
        <button type="button" id="grdOv14_del">ID로 삭제</button>
    </div>
    <syn_opengrid id="grdOv14" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호(ID)', 90, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov14.js"></script>
</body>
</html>
