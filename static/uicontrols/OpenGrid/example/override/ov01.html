<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-01 표시값 꾸미기 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-01 · 표시값 꾸미기</h2>
    <p class="desc">grid.override("getDisplayValue", (orig, rowIndex, field) =&gt; ...) 로 표시값에 스타일을 덧입힙니다. (getDisplayValue는 text 계열 렌더러가 소비하므로 text 컬럼에 적용합니다 — number/date 컬럼 서식은 OV-23 처럼 strategy("displayFormatter") 를 사용합니다.)</p>
    <syn_opengrid id="grdOv01" class="demo-grid" syn-options="{
        columns: [['MemberName', '이름', 160, false, 'text'], ['Point', '포인트', 120, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov01.js"></script>
</body>
</html>
