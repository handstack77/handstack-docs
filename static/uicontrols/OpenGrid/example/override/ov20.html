<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-20 특정 컬럼 가로 스크롤 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-20 · 특정 컬럼 가로 스크롤(P1)<span class="demo-badge">inject·P1</span></h2>
    <p class="desc">jumpToCol()은 빈 스텁입니다. override로 컬럼 누적 폭을 계산해 가로 스크롤을 주입합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv20_jump">Memo 컬럼으로 스크롤</button>
    </div>
    <syn_opengrid id="grdOv20" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text'], ['Email', '이메일', 200, false, 'text'],
            ['Department', '부서', 110, false, 'text'], ['Salary', '급여', 120, false, 'number'], ['JoinDate', '입사일', 110, false, 'text'], ['Memo', '메모', 260, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov20.js"></script>
</body>
</html>
