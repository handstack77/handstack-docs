<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-11 행 선택·해제 가로채기 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-11 · 행 선택·해제 가로채기</h2>
    <p class="desc">selectionChange 이벤트를 가로채, 비활성(UseYN=0) 회원 행은 선택되는 즉시 선택 해제합니다.</p>
    <syn_opengrid id="grdOv11" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호', 70, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text'], ['UseYN', '활성(0=선택차단)', 100, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov11.js"></script>
</body>
</html>
