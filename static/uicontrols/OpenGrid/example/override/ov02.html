<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OV-02 데이터 넣기 전 검사 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · Override</div>
    <h2>OV-02 · 데이터 넣기 전 검사</h2>
    <p class="desc">grid.override("insertRow", ...)로 필수값 없는 행 추가를 막습니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdOv02_ok">이름 있는 행 추가</button>
        <button type="button" id="grdOv02_bad">이름 없는 행 추가(차단)</button>
    </div>
    <syn_opengrid id="grdOv02" class="demo-grid" syn-options="{
        columns: [['MemberNo', '번호', 70, false, 'number', true, 'center'], ['MemberName', '이름', 120, false, 'text']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="ov02.js"></script>
</body>
</html>
