<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>컬럼 리오더 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 데이터 & 컬럼</div>
    <h2>컬럼 리오더</h2>
    <p class="desc">헤더를 드래그해 컬럼 순서를 바꿉니다(open-grid 기본 헤더 드래그 동작).</p>
    <syn_opengrid id="grdColumnReorder" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Department', '부서', 110, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="columnReorder.js"></script>
</body>
</html>
