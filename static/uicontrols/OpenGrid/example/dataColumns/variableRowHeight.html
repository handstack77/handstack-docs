<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>가변 행 높이 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 데이터 & 컬럼</div>
    <h2>가변 행 높이</h2>
    <p class="desc">긴 텍스트를 담은 셀이 자동으로 줄바꿈되며 행 높이가 늘어납니다(autoHeight).</p>
    <syn_opengrid id="grdVariableRowHeight" class="demo-grid" syn-options="{
        dynamicRowHeight: true,
        columns: [
            ['MemberName', '이름', 100, false, 'text'],
            ['Memo', '메모', 400, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="variableRowHeight.js"></script>
</body>
</html>
