<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>고정 컬럼 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 데이터 & 컬럼</div>
    <h2>고정 컬럼</h2>
    <p class="desc">가로 스크롤에도 왼쪽 N개 컬럼을 고정합니다(freeze).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdFixedColumns_freeze2">2컬럼 고정</button>
        <button type="button" id="grdFixedColumns_freeze0" class="secondary">고정 해제</button>
    </div>
    <syn_opengrid id="grdFixedColumns" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Email', '이메일', 200, false, 'text'],
            ['Department', '부서', 110, false, 'text'],
            ['Salary', '급여', 120, false, 'number'],
            ['JoinDate', '입사일', 110, false, 'text'],
            ['Memo', '메모', 260, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="fixedColumns.js"></script>
</body>
</html>
