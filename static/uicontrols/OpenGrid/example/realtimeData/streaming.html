<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>스트리밍 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 실시간 데이터</div>
    <h2>스트리밍</h2>
    <p class="desc">0.8초마다 임의의 행 하나가 서버 푸시처럼 갱신됩니다(setCellValue 기반 시뮬레이션).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdStreaming_start">스트리밍 시작</button>
        <button type="button" id="grdStreaming_stop" class="secondary">중지</button>
    </div>
    <syn_opengrid id="grdStreaming" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="streaming.js"></script>
</body>
</html>
