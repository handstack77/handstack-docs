<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>그리드 옵션 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 시작하기</div>
    <h2>그리드 옵션</h2>
    <p class="desc">editable · selectionMode · rowHeight 같은 그리드 레벨 옵션을 토글해 봅니다.</p>

    <div class="demo-toolbar">
        <button type="button" id="grdGridOptions_toggleEditable">편집 가능/불가 토글</button>
    </div>

    <syn_opengrid id="grdGridOptions" class="demo-grid" syn-options="{
        editable: true,
        selectionMode: 'single',
        rowHeight: 32,
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>

    <div id="divLog" class="log-panel"></div>

    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="gridOptions.js"></script>
</body>
</html>
