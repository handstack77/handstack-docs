<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>데이터바 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 조건부서식</div>
    <h2>데이터바</h2>
    <p class="desc">셀 값 크기에 비례한 막대를 배경에 그립니다(setConditionalFormat, encode.kind="bar").</p>
    <div class="demo-toolbar">
        <button type="button" id="grdCfDataBar_apply">데이터바 적용</button>
        <button type="button" id="grdCfDataBar_clear" class="secondary">해제</button>
    </div>
    <syn_opengrid id="grdCfDataBar" class="demo-grid" syn-options="{
        columns: [
            ['MemberName', '이름', 110, false, 'text'],
            ['Point', '포인트', 200, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="cfDataBar.js"></script>
</body>
</html>
