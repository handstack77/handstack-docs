<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>아이콘셋·델타 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 조건부서식</div>
    <h2>아이콘셋·델타</h2>
    <p class="desc">증감률 구간을 3단계 아이콘(상/중/하)으로 표시합니다(encode.kind="icon").</p>
    <div class="demo-toolbar">
        <button type="button" id="grdCfIconDelta_apply">아이콘셋 적용</button>
        <button type="button" id="grdCfIconDelta_clear" class="secondary">해제</button>
    </div>
    <syn_opengrid id="grdCfIconDelta" class="demo-grid" syn-options="{
        columns: [
            ['MemberName', '이름', 110, false, 'text'],
            ['ChangeRate', '증감률', 160, false, 'number', true, 'right', null, { format: '#,##0.0;(#,##0.0)' }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="cfIconDelta.js"></script>
</body>
</html>
