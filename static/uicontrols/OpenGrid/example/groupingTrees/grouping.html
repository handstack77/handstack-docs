<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>그룹핑 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 그룹 & 트리</div>
    <h2>그룹핑</h2>
    <p class="desc">부서 기준으로 그룹핑하고 접기/펼치기를 제어합니다(groupBy).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdGrouping_group">부서로 그룹핑</button>
        <button type="button" id="grdGrouping_ungroup" class="secondary">그룹 해제</button>
        <button type="button" id="grdGrouping_expand">모두 펼치기</button>
        <button type="button" id="grdGrouping_collapse">모두 접기</button>
    </div>
    <syn_opengrid id="grdGrouping" class="demo-grid" syn-options="{
        columns: [
            ['Department', '부서', 110, false, 'text'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="grouping.js"></script>
</body>
</html>
