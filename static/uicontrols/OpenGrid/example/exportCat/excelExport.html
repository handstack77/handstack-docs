<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>엑셀 내보내기 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 내보내기</div>
    <h2>엑셀 내보내기</h2>
    <p class="desc">현재 그리드 내용을 xlsx 파일로 내려받습니다(exportExcel).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdExcelExport_export">Excel 내보내기</button>
    </div>
    <syn_opengrid id="grdExcelExport" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="excelExport.js"></script>
</body>
</html>
