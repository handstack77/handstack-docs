<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSV/JSON - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 내보내기</div>
    <h2>CSV/JSON</h2>
    <p class="desc">CSV와 JSON 두 형식으로 내보냅니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdCsvJson_csv">CSV 내보내기</button>
        <button type="button" id="grdCsvJson_json" class="secondary">JSON 내보내기</button>
    </div>
    <syn_opengrid id="grdCsvJson" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="csvJson.js"></script>
</body>
</html>
