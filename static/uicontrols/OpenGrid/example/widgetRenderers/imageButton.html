<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이미지 / 버튼 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 위젯 렌더러</div>
    <h2>이미지 / 버튼</h2>
    <p class="desc">ColumnDef.renderer로 아바타 이미지와 버튼 렌더러를 사용합니다.</p>
    <syn_opengrid id="grdImageButton" class="demo-grid" syn-options="{
        columns: [
            ['Avatar', '아바타', 70, false, 'text', true, 'center', null, { renderer: { type: 'image', width: 32, height: 32, radius: 16, srcFn: function (v) { return v; } } }],
            ['MemberName', '이름', 120, false, 'text'],
            ['UseYN', '상태', 100, false, 'text', true, 'center', null, { renderer: { type: 'button', label: '상세보기' } }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="imageButton.js"></script>
</body>
</html>
