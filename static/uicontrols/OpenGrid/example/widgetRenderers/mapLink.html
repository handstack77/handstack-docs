<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>지도 연동 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 위젯 렌더러</div>
    <h2>지도 연동</h2>
    <p class="desc">주소/지역 값을 지도 서비스로 여는 링크 렌더러입니다(외부 지도 API 키 없이 검색 URL로 대체).</p>
    <syn_opengrid id="grdMapLink" class="demo-grid" syn-options="{
        columns: [
            ['MemberName', '이름', 110, false, 'text'],
            ['Department', '근무지', 120, false, 'text', true, 'left', null, { renderer: { type: 'link', hrefFn: function (v) { return 'https://map.kakao.com/?q=' + encodeURIComponent(v); } } }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="mapLink.js"></script>
</body>
</html>
