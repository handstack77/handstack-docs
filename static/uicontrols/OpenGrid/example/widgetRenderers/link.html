<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>링크 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 위젯 렌더러</div>
    <h2>링크</h2>
    <p class="desc">Email 컬럼을 mailto 링크로 렌더링합니다.</p>
    <syn_opengrid id="grdLink" class="demo-grid" syn-options="{
        columns: [
            ['MemberName', '이름', 120, false, 'text'],
            ['Email', '이메일', 220, false, 'text', true, 'left', null, { renderer: { type: 'link', hrefFn: function (v) { return 'mailto:' + v; } } }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="link.js"></script>
</body>
</html>
