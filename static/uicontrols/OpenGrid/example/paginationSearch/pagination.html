<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>페이지네이션 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 페이지 & 검색</div>
    <h2>페이지네이션<span class="demo-badge">자체구현</span></h2>
    <p class="desc">open-grid에 페이지 단위 네비게이션 API가 노출돼 있지 않아, 클라이언트에서 20건씩 잘라 setValue로 교체하는 방식으로 재현합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdPagination_prev" class="secondary">이전 페이지</button>
        <button type="button" id="grdPagination_next">다음 페이지</button>
    </div>
    <syn_opengrid id="grdPagination" class="demo-grid" syn-options="{
        columns: [
            ['ProdID', '상품코드', 90, false, 'text'],
            ['ProdName', '상품명', 140, false, 'text'],
            ['Price', '가격', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="pagination.js"></script>
</body>
</html>
