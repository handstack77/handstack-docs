<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>키보드 단축키 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 페이지 & 검색</div>
    <h2>키보드 단축키</h2>
    <p class="desc">방향키로 셀 이동, Enter/F2로 편집 시작, Esc로 편집 취소가 가능합니다(open-grid 기본 키보드 내비게이션).</p>
    <syn_opengrid id="grdKeyboardShortcuts" class="demo-grid" syn-options="{
        editable: true,
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="keyboardShortcuts.js"></script>
</body>
</html>
