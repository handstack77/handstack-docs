<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>셀 타입 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 셀 & 편집</div>
    <h2>셀 타입</h2>
    <p class="desc">text / number / checkbox / dropdown / codehelp 다섯 가지 셀 타입을 한 그리드에서 보여줍니다.</p>
    <syn_opengrid id="grdCellTypes" class="demo-grid" syn-options="{
        editable: true,
        columns: [
            ['MemberNo', '번호(number)', 100, false, 'number', true, 'center'],
            ['MemberName', '이름(text)', 110, false, 'text'],
            ['RoleID', '역할(dropdown)', 120, false, 'dropdown', false, 'center', null, { storeSourceID: 'ROLE' }],
            ['UseYN', '사용(checkbox)', 90, false, 'checkbox', false, 'center', null, { checkValue: '1', unCheckValue: '0' }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="cellTypes.js"></script>
</body>
</html>
