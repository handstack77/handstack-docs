<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>데이터 마스킹 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 셀 & 편집</div>
    <h2>데이터 마스킹</h2>
    <p class="desc">Email 컬럼을 마스킹 처리/해제합니다(setMaskEnabled).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdMasking_mask">Email 마스킹 ON</button>
        <button type="button" id="grdMasking_unmask" class="secondary">Email 마스킹 OFF</button>
    </div>
    <syn_opengrid id="grdMasking" class="demo-grid" syn-options="{
        columns: [
            ['MemberName', '이름', 110, false, 'text'],
            ['Email', '이메일', 220, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="masking.js"></script>
</body>
</html>
