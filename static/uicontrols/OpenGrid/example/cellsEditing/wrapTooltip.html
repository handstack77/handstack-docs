<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>줄바꿈 & 툴팁 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 셀 & 편집</div>
    <h2>줄바꿈 & 툴팁</h2>
    <p class="desc">긴 텍스트는 title 속성 툴팁으로, dynamicRowHeight로 줄바꿈 표시도 가능합니다.</p>
    <syn_opengrid id="grdWrapTooltip" class="demo-grid" syn-options="{
        dynamicRowHeight: true,
        columns: [
            ['MemberName', '이름', 100, false, 'text'],
            ['Memo', '메모(마우스오버 시 전체 텍스트)', 320, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="wrapTooltip.js"></script>
</body>
</html>
