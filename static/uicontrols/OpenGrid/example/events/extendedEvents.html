<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이벤트 확장 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 이벤트</div>
    <h2>이벤트 확장</h2>
    <p class="desc">sortChange / filterChange / dataChange까지 확장한 이벤트 세트입니다.</p>
    <syn_opengrid id="grdExtendedEvents" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Point', '포인트', 100, false, 'number']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="extendedEvents.js"></script>
</body>
</html>
