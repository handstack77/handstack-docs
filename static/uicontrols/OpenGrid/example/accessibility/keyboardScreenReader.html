<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>키보드 · 낭독 · 텍스트 등가 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 접근성</div>
    <h2>키보드 · 낭독 · 텍스트 등가</h2>
    <p class="desc">Tab으로 그리드에 포커스한 뒤 방향키로 셀을 이동해 보세요. 셀 값은 스크린리더가 읽을 수 있는 텍스트로 노출됩니다.</p>
    <syn_opengrid id="grdKeyboardScreenReader" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['UseYN', '사용', 80, false, 'checkbox', false, 'center', null, { checkValue: '1', unCheckValue: '0' }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="keyboardScreenReader.js"></script>
</body>
</html>
