<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>통합차트-04 수식 연동 라이브 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 업무용 기능</div>
    <h2>통합차트-04 · 수식 연동 라이브</h2>
    <p class="desc">live:true 차트는 수식 재계산(formulaRecalc)·데이터 변경 이벤트를 구독해 자동으로 다시 그려집니다. 단가를 편집해 보세요.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdChart04_show">라이브 차트 표시</button>
    </div>
    <syn_opengrid id="grdChart04" class="demo-grid" syn-options="{
        editable: true,
        columns: [['ProdName', '상품명', 130, false, 'text'], ['Price', '단가', 90, false, 'number'], ['Qty', '수량', 80, false, 'number'], ['Total', '합계(수식)', 110, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="chart04.js"></script>
</body>
</html>
