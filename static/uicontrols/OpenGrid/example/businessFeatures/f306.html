<!DOCTYPE html>
<html lang="ko">
<head>

    <p class="desc">0으로 나눔(div0) · 순환 참조(cycle) · 존재하지 않는 필드 참조(name/ref) 세 가지 수식 오류를 셀에 그대로 노출합니다.</p>

        <button type="button" id="grdF306_trigger">3종 오류 발생시키기</button>
    </div>
    <syn_opengrid id="grdF306" class="demo-grid" syn-options="{
        editable: true,
        columns: [['Label', '항목', 120, false, 'text'], ['Price', '단가', 90, false, 'number'], ['Result', '결과(수식)', 150, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
