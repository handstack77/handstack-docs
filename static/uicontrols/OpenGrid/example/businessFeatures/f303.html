<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>F3-03 필터를 아는 범위 함수 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">

</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 업무용 기능</div>
    <h2>F3-03 · 필터를 아는 범위 함수</h2>
    <p class="desc">Footer 합계는 필터를 적용한 뒤에도 화면에 보이는(필터 통과한) 행만 대상으로 재계산됩니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdF303_filter">개발팀만 필터</button>
        <button type="button" id="grdF303_footer">Point 합계 Footer</button>
        <button type="button" id="grdF303_clear" class="secondary">필터 해제</button>
    </div>
    <syn_opengrid id="grdF303" class="demo-grid" syn-options="{
        columns: [['Department', '부서', 110, false, 'text'], ['MemberName', '이름', 120, false, 'text'], ['Point', '포인트', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="f303.js"></script>
