<head>

<body>

    <p class="desc">500행에 한꺼번에 수식을 적용하며 걸린 시간을 진행 신호로 보여줍니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdF307_run">500행 재계산</button>
    </div>
    <syn_opengrid id="grdF307" class="demo-grid" syn-options="{
        columns: [['ProdID', '코드', 90, false, 'text'], ['Price', '단가', 90, false, 'number'], ['Qty', '수량', 80, false, 'number'], ['Total', '합계', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>

    <script src="../../CodePicker/CodePicker.js"></script>
