<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">

</head>
<body>

    <h2>통합차트-01 · 컬럼 차트 기본</h2>
    <p class="desc">그리드 내장 차트 엔진(createChart)으로 전체 데이터 기준 막대 차트를 그리드 안쪽에 바로 붙입니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdChart01_show">차트 표시</button>
    </div>
    <syn_opengrid id="grdChart01" class="demo-grid" syn-options="{
        columns: [['ProdName', '상품명', 130, false, 'text'], ['Price', '가격', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>

    <script src="chart01.js"></script>
