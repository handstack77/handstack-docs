<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>통합차트-05 대용량 샘플링 배지 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 업무용 기능</div>
    <h2>통합차트-05 · 대용량 샘플링 배지</h2>
    <p class="desc">행이 아주 많으면 차트는 전부를 그리지 않고 일부만 샘플링해서 그리며, "샘플링됨" 배지로 그 사실을 투명하게 표시합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdChart05_load">5000행 로드</button>
        <button type="button" id="grdChart05_show">차트 표시(샘플링 배지 확인)</button>
    </div>
    <syn_opengrid id="grdChart05" class="demo-grid" syn-options="{
        columns: [['ProdID', '코드', 90, false, 'text'], ['Price', '가격', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="chart05.js"></script>
</body>
</html>
