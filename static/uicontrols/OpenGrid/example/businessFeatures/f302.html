<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 업무용 기능</div>
    <h2>F3-02 · 필드명 참조 방식</h2>
    <p class="desc">이 엔진의 수식은 셀 좌표(A1)가 아니라 필드명을 직접 참조합니다(예: "=Price*Qty"). 필드명 참조는 컬럼 순서가 바뀌어도 깨지지 않는 장점이 있습니다.</p>
    <syn_opengrid id="grdF302" class="demo-grid" syn-options="{
        editable: true,
        columns: [['Price', '단가', 100, false, 'number'], ['Qty', '수량', 90, false, 'number'], ['Total', '합계(=Price*Qty)', 130, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="f302.js"></script>
</body>
