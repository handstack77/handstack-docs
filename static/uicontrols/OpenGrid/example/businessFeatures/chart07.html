    <p class="desc">차트는 캔버스 옆에 스크린리더용 숨은 데이터 표(a11y table)를 항상 함께 렌더링합니다. 시각적 캔버스가 없어도 표로 같은 정보를 읽을 수 있습니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdChart07_show">차트 표시 + a11y 표 확인</button>
    </div>
    <syn_opengrid id="grdChart07" class="demo-grid" syn-options="{
        columns: [['ProdName', '상품명', 130, false, 'text'], ['Price', '가격', 100, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
