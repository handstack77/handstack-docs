<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>차트 값 왜곡 방지 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 업무용 기능</div>
    <h2>차트 값 왜곡 방지(축절단·면적·결측)</h2>
    <p class="desc">막대 차트는 값에 음수가 섞여 있어도 항상 0을 기준선에 포함시켜, 축을 임의로 잘라 크기 차이를 과장하는 왜곡을 원천적으로 방지합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdChartDistortion_show">증감률(음수 포함) 차트 표시</button>
    </div>
    <syn_opengrid id="grdChartDistortion" class="demo-grid" syn-options="{
        columns: [['MemberName', '이름', 110, false, 'text'], ['ChangeRate', '증감률', 110, false, 'number']]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="chartDistortion.js"></script>
</body>
</html>
