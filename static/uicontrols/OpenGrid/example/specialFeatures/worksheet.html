<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>워크시트 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>워크시트</h2>
    <p class="desc">탭으로 여러 시트를 전환합니다(addWorksheet/switchWorksheet).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdWorksheet_addSheet">상품 시트 추가</button>
        <button type="button" id="grdWorksheet_toMember" class="secondary">기본 시트로</button>
    </div>
    <syn_opengrid id="grdWorksheet" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="worksheet.js"></script>
</body>
</html>
