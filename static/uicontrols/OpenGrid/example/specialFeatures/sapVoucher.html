<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAP 전표 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>SAP 전표</h2>
    <p class="desc">계정과목·적요·차변·대변 형태의 전표 입력 그리드입니다. 저장 시 차대변 합계 일치 여부를 검증합니다(전자결재/재무 문서 처리 방식 시뮬레이션).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdSapVoucher_addLine">전표 라인 추가</button>
        <button type="button" id="grdSapVoucher_save">전표 저장(대차 검증)</button>
    </div>
    <syn_opengrid id="grdSapVoucher" class="demo-grid" syn-options="{
        editable: true,
        columns: [
            ['Account', '계정과목', 130, false, 'text'],
            ['Description', '적요', 200, false, 'text'],
            ['Debit', '차변', 120, false, 'number', true, 'right', null, { format: '#,##0' }],
            ['Credit', '대변', 120, false, 'number', true, 'right', null, { format: '#,##0' }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="sapVoucher.js"></script>
</body>
</html>
