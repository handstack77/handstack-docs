<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>다국어 (i18n) - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>다국어 (i18n)</h2>
    <p class="desc">그리드 UI 문구(빈 데이터, 필터 버튼 등)의 로케일을 전환합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdI18n_ko">한국어</button>
        <button type="button" id="grdI18n_en" class="secondary">English</button>
    </div>
    <syn_opengrid id="grdI18n" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="i18n.js"></script>
</body>
</html>
