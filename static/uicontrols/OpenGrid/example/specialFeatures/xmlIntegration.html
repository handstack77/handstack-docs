<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XML 연동 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>XML 연동</h2>
    <p class="desc">DOMParser로 XML 문자열을 파싱해 그리드에 적재하고, 반대로 그리드 데이터를 XML로 직렬화합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdXmlIntegration_import">샘플 XML 가져오기</button>
        <button type="button" id="grdXmlIntegration_export" class="secondary">XML로 내보내기</button>
    </div>
    <syn_opengrid id="grdXmlIntegration" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['Department', '부서', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <pre id="grdXmlIntegration_out" style="margin-top:8px; padding:8px; background:#111827; color:#d1d5db; font-size:11px; max-height:120px; overflow:auto;"></pre>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="xmlIntegration.js"></script>
</body>
</html>
