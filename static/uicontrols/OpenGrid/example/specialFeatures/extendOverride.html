<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>확장·오버라이드 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>확장·오버라이드</h2>
    <p class="desc">open-grid의 override/strategy 확장 카탈로그를 실시간으로 조회합니다(개별 오버라이드 32종 예제는 목록의 "Override" 카테고리 참고).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdExtendOverride_catalog">확장 카탈로그 조회</button>
    </div>
    <syn_opengrid id="grdExtendOverride" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="extendOverride.js"></script>
</body>
</html>
