<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>피벗 테이블 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>피벗 테이블<span class="demo-badge">자체구현</span></h2>
    <p class="desc">부서(행) × 역할(열)로 포인트 합계를 재구성한 피벗 표입니다. open-grid에 피벗 전용 API는 없어 클라이언트에서 집계 후 setValue로 반영합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdPivotTable_pivot">피벗 재계산</button>
    </div>
    <syn_opengrid id="grdPivotTable" class="demo-grid" syn-options="{
        columns: [
            ['Department', '부서', 120, false, 'text'],
            ['Admin', '관리자 합계', 130, false, 'number', true, 'right'],
            ['Manager', '매니저 합계', 130, false, 'number', true, 'right'],
            ['Member', '회원 합계', 130, false, 'number', true, 'right']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="pivotTable.js"></script>
</body>
</html>
