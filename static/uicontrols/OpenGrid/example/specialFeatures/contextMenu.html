<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>컨텍스트 메뉴 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 특수 기능</div>
    <h2>컨텍스트 메뉴</h2>
    <p class="desc">행 위에서 마우스 오른쪽 버튼 클릭 시 기본 컨텍스트 메뉴(복사/CSV 내보내기)가 열립니다.</p>
    <syn_opengrid id="grdContextMenu" class="demo-grid" syn-options="{
        contextMenu: true,
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="contextMenu.js"></script>
</body>
</html>
