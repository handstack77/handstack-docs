<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>행 상태 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 행 & 선택</div>
    <h2>행 상태</h2>
    <p class="desc">행 추가/삭제 후 Flag(R/C/U/D) 값을 직접 눈으로 확인합니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdRowState_add">행 추가</button>
        <button type="button" id="grdRowState_del">선택 행 삭제</button>
        <button type="button" id="grdRowState_dump">Flag 전체 덤프</button>
    </div>
    <syn_opengrid id="grdRowState" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="rowState.js"></script>
</body>
</html>
