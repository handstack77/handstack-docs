<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>체크박스 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 행 & 선택</div>
    <h2>체크박스</h2>
    <p class="desc">UseYN 체크박스 컬럼과 체크된 행 조회를 보여줍니다.</p>
    <div class="demo-toolbar">
        <button type="button" id="grdCheckbox_checked">체크된 행 확인</button>
    </div>
    <syn_opengrid id="grdCheckbox" class="demo-grid" syn-options="{
        editable: true,
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text'],
            ['UseYN', '사용', 70, false, 'checkbox', false, 'center', null, { checkValue: '1', unCheckValue: '0' }]
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="checkbox.js"></script>
</body>
</html>
