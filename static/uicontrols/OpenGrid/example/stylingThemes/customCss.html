<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>커스텀 CSS - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 스타일 & 테마</div>
    <h2>커스텀 CSS</h2>
    <p class="desc">CSS 변수(--og-primary 등) 값을 런타임에 바꿉니다(setThemeVar).</p>
    <div class="demo-toolbar">
        <button type="button" id="grdCustomCss_purple">포인트 컬러 보라색으로</button>
        <button type="button" id="grdCustomCss_reset" class="secondary">초기화</button>
    </div>
    <syn_opengrid id="grdCustomCss" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="customCss.js"></script>
</body>
</html>
