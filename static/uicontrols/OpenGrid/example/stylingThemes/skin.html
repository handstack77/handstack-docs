<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>스킨 - OpenGrid 예제</title>
    <link rel="stylesheet" href="../../OpenGrid.css">
    <link rel="stylesheet" href="../common.css">
</head>
<body>
    <div class="demo-nav"><a href="../index.html">← 목록으로</a> · 스타일 & 테마</div>
    <h2>스킨</h2>
    <p class="desc">형태(모서리·외곽선) 축을 색과 별개로 전환합니다(setSkin).</p>
    <div class="demo-toolbar">
        <select id="grdSkin_skin">
            <option value="default">default</option>
            <option value="round">round</option>
        </select>
    </div>
    <syn_opengrid id="grdSkin" class="demo-grid" syn-options="{
        columns: [
            ['MemberNo', '번호', 70, false, 'number', true, 'center'],
            ['MemberName', '이름', 120, false, 'text']
        ]
    }"></syn_opengrid>
    <div id="divLog" class="log-panel"></div>
    <script src="../../../../js/syn.js"></script>
    <script src="../../CodePicker/CodePicker.js"></script>
    <script src="../../OpenGrid.js"></script>
    <script src="../common.js"></script>
    <script src="skin.js"></script>
</body>
</html>
