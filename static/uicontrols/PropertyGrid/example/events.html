<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PropertyGrid - 이벤트/메서드 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <h3>PropertyGrid 이벤트 및 메서드 예제</h3>
        <p>
            <code>callback</code>에 <code>"$events.handleChange"</code>처럼 페이지 스크립트 함수를 문자열로 지정하면,
            사용자가 값을 바꿀 때마다 <code>callback(element, name, value, control)</code> 형태로 호출됩니다.
            아래 버튼으로 getValue / setValue / clear 메서드도 함께 확인할 수 있습니다.
        </p>

        <syn_propertygrid id="pgEvents" syn-options="{
            data: {
                NotifyYN: true,
                Volume: 50,
                Nickname: '길동'
            },
            meta: {
                Volume: { type: 'number', options: { min: 0, max: 100, step: 5 } }
            },
            callback: '$this.method.handleChange'
        }"></syn_propertygrid>

        <hr />

        <div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>

        <hr />

        <div>
            <div>결과 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
