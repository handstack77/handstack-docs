<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PropertyGrid Example</title>
    <link rel="stylesheet" href="../PropertyGrid.css">
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f7f8fa;
            color: #1f2937;
            font-family: Arial, "Malgun Gothic", sans-serif;
            font-size: 14px;
        }

        .example-page {
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
            gap: 16px;
            align-items: start;
        }

        .example-toolbar {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .example-panel {
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
        }

        .example-panel h1,
        .example-panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .example-output {
            width: 100%;
            min-height: 280px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 13px;
            resize: vertical;
        }

        .example-log {
            min-height: 72px;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fafafa;
            font-family: Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .example-button {
            min-height: 34px;
            padding: 6px 12px;
            border: 1px solid #2563eb;
            border-radius: 4px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .example-select {
            min-height: 34px;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
        }

        .example-button.secondary {
            border-color: #6b7280;
            background: #fff;
            color: #374151;
        }

        .example-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #eef2ff;
            color: #3730a3;
            font-weight: 700;
        }

        .example-textarea {
            width: 100%;
            min-height: 120px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            white-space: nowrap;
            overflow-x: auto;
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
            }

            .example-page {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="example-page">
        <div class="example-toolbar">
            <label for="ddlControlPreset">Control defaultSetting</label>
            <select id="ddlControlPreset" class="example-select"></select>
            <button type="button" id="btnGetValues" class="example-button">Get values</button>
            <button type="button" id="btnResetValues" class="example-button secondary">Reset</button>
        </div>

        <section class="example-panel">
            <h1>Selected control</h1>
            <div id="propGridDefaultSetting"></div>
        </section>

        <section class="example-panel">
            <h2>Custom type sample</h2>
            <div id="propGridAdvanced"></div>
        </section>

        <section class="example-panel">
            <h2>Current values</h2>
            <textarea id="txtValues" class="example-output" readonly></textarea>
        </section>

        <section class="example-panel">
            <h2>Change log</h2>
            <div id="eventsLog" class="example-log"></div>
        </section>
    </main>

    <script src="../../../js/syn.js"></script>
    <script src="../PropertyGrid.js"></script>
    <script src="example.js"></script>
</body>
</html>
