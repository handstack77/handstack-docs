<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PropertyGrid - 기본 예제</title>
</head>
<body style="visibility: hidden;">
    <form autocomplete="off" id="form1" syn-datafield="MainForm">
        <h3>PropertyGrid 기본 예제</h3>
        <p>
            <code>syn-options</code>의 <code>data</code>에 객체를 넘기면, 각 속성값의 타입(문자열/숫자/불리언/색상)에 맞춰
            <code>autoMeta</code>가 자동으로 입력 위젯을 만들어 줍니다. 별도의 <code>meta</code> 지정이 필요 없습니다.
        </p>

        <syn_propertygrid id="pgBasic" syn-options="{
            data: {
                Name: '홍길동',
                Age: 32,
                UseYN: true,
                FavoriteColor: '#2563eb'
            }
        }"></syn_propertygrid>

        <hr />

        <div>
            <input type="button" id="btnGetValue" value="getValue" syn-events="['click']" />
            <input type="button" id="btnSetValue" value="setValue" syn-events="['click']" />
            <input type="button" id="btnClear" value="clear" syn-events="['click']" />
        </div>

        <hr />

        <div>
            <div>결과 / 이벤트 로그</div>
            <pre id="preLog"></pre>
        </div>
    </form>
    <script src="/js/syn.loader.js"></script>
</body>
</html>
